/*
 * Structured input grammar for proto-fuzz-virtio-console.
 *
 * virtio-console / virtio-serial layout:
 *   vq 0 = port 0 receive (host -> guest)
 *   vq 1 = port 0 transmit (guest -> host)
 *   vq 2 = control receive
 *   vq 3 = control transmit
 *   vq 4..2*N+3 = port N rx/tx
 *
 * Control messages (virtio_console_control, 8 bytes):
 *   le32 id    // port id
 *   le16 event
 *   le16 value
 *
 * Events: 0=DEVICE_READY, 1=DEVICE_ADD, 2=DEVICE_REMOVE, 3=PORT_READY,
 *         4=CONSOLE_PORT, 5=RESIZE, 6=PORT_OPEN, 7=PORT_NAME.
 */

syntax = "proto3";
package qemu.fuzz.console;

message GetFeatures   {}
message SetFeatures   { uint64 features = 1; }
message ConfigRead    { uint32 offset = 1; uint32 size = 2; }
message ConfigWrite   { uint32 offset = 1; bytes  data = 2; }
message VqSelect      { uint32 vq_idx = 1; }
message VqSetup       { uint32 vq_idx = 1; uint32 size = 2; }
message SetStatus     { uint32 bits   = 1; }
message GuestMemWrite { uint32 buf_id = 1; bytes data = 2; }
message VqAddDesc {
  uint32 vq_idx = 1;
  uint32 buf_id = 2;
  uint32 len    = 3;
  bool   device_writable = 4;
  bool   chain_next      = 5;
}
message VqKick     { uint32 vq_idx = 1; }
message VqWaitUsed { uint32 vq_idx = 1; }
message Reset      {}

message MemwriteAbsolute { uint64 gpa = 1; bytes data = 2; }
message MmioCorrupt      { uint32 offset = 1; uint32 value = 2; uint32 size = 3; }

/* Send bytes on a port's TX queue. port_id=0 maps to vq 1; port_id=N
 * (N>0) maps to vq 2*N+1. */
message TxData {
  uint32 port_id = 1;
  bytes  data    = 2;
}

/* Stage an RX buffer for a port (reverse direction). */
message RxBuf {
  uint32 port_id = 1;
  uint32 size    = 2;
}

/* Send a control message on the control TX queue (vq 3). Free-form
 * event/value for fuzzing the control state machine. */
message CtrlMsg {
  uint32 port_id = 1;
  uint32 event   = 2;
  uint32 value   = 3;
  bytes  data    = 4;     // appended after the 8-byte header for some events
}

message VirtioOp {
  oneof op {
    GetFeatures   get_features    = 1;
    SetFeatures   set_features    = 2;
    ConfigRead    config_read     = 3;
    ConfigWrite   config_write    = 4;
    VqSelect      vq_select       = 5;
    VqSetup       vq_setup        = 6;
    SetStatus     set_status      = 7;
    GuestMemWrite guest_mem_write = 8;
    VqAddDesc     vq_add_desc     = 9;
    VqKick        vq_kick         = 10;
    VqWaitUsed    vq_wait_used    = 11;
    Reset         reset           = 12;

    TxData    tx_data    = 20;
    RxBuf     rx_buf     = 21;
    CtrlMsg   ctrl_msg   = 22;

    MemwriteAbsolute mem_write_absolute = 30;
    MmioCorrupt      mmio_corrupt       = 31;
  }
}

message VirtioConsoleProgram {
  repeated VirtioOp ops = 1;
  repeated VirtioOp ops_thread_b = 2;
  uint32 thread_b_iter = 3;
}
